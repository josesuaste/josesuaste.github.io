<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gracias — ERROR404</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="images/favicon/hojas.svg">
    <link rel="apple-touch-icon" href="images/favicon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700;900&display=swap">
    <style>
        :root {
            --bg-cream: #f4f1ea;
            --blue: #1a5cff;
            --blue-muted: rgba(26, 92, 255, 0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            color: var(--blue);
            min-height: 100svh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            z-index: 100;
            background-color: transparent;
            transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
        }

        .navbar.scrolled {
            background-color: rgba(244, 241, 234, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: -0.03em;
            color: var(--blue);
            text-decoration: none;
        }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Círculo decorativo de fondo */
        main::before {
            content: '';
            position: absolute;
            width: min(600px, 90vw);
            height: min(600px, 90vw);
            border-radius: 50%;
            border: 1.5px solid rgba(26, 92, 255, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        main::after {
            content: '';
            position: absolute;
            width: min(400px, 60vw);
            height: min(400px, 60vw);
            border-radius: 50%;
            border: 1.5px solid rgba(26, 92, 255, 0.07);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* ── Contenido ── */
        .thanks-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--blue);
            opacity: 0.5;
            margin-bottom: 32px;
        }

        .thanks-title {
            font-size: clamp(5rem, 15vw, 14rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            color: var(--blue);
            margin-bottom: 48px;
        }

        .thanks-message {
            max-width: 520px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            line-height: 1.7;
            color: var(--blue);
            opacity: 0.75;
            margin-bottom: 56px;
        }

        .thanks-message strong {
            font-weight: 600;
            opacity: 1;
            color: var(--blue);
        }

        /* ── Botones ── */
        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--blue);
            color: var(--bg-cream);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 100px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
            color: var(--blue);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 100px;
            border: 1.5px solid rgba(26, 92, 255, 0.3);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn-secondary:hover {
            transform: scale(1.03);
            border-color: var(--blue);
        }

        /* ── Footer ── */
        footer {
            padding: 24px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(26, 92, 255, 0.1);
        }

        footer p {
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0.4;
            letter-spacing: 0.02em;
        }

        footer a {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        footer a:hover { opacity: 1; }

        /* ── Animaciones de entrada ── */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease forwards;
        }

        .fade-up:nth-child(1) { animation-delay: 0.1s; }
        .fade-up:nth-child(2) { animation-delay: 0.25s; }
        .fade-up:nth-child(3) { animation-delay: 0.45s; }
        .fade-up:nth-child(4) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .navbar { padding: 0 24px; }
            main { padding: 100px 5% 60px; }
            footer { padding: 20px 24px; flex-direction: column; gap: 8px; text-align: center; }
        }

        @media (prefers-reduced-motion: reduce) {
            .fade-up {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">ERROR404</a>
    </nav>

    <main>
        <p class="thanks-label fade-up">Donación recibida</p>

        <h1 class="thanks-title fade-up">gracias.</h1>

        <p class="thanks-message fade-up">
            Hago este contenido porque genuinamente disfruto descubrir cosas y compartirlas.
            <strong>Tu apoyo significa que puedo seguir haciéndolo.</strong>
            De verdad, gracias por estar aquí.
        </p>

        <div class="actions fade-up">
            <a href="https://www.youtube.com/@josesuaste-tech?sub_confirmation=1"
               target="_blank" rel="noopener noreferrer"
               class="btn-primary">
                Ver el canal
            </a>
            <a href="index.html" class="btn-secondary">
                Volver al inicio
            </a>
        </div>
    </main>

    <footer>
        <p>© 2025 José Suaste</p>
        <a href="index.html">ERROR404</a>
    </footer>

    <script>
        // Navbar glassmorphism al hacer scroll
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        }, { passive: true });
    </script>

</body>
</html>
