<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje enviado — ERROR404</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Variables duplicadas en caso de que no cargue el CSS principal, 
           pero hereda las de style.css */
        :root {
            --blue: #1a5ed4;
            --text-primary: #1a5ed4;
            --orange: #ff7d61;
            --white: #ffffff;
            --bg-cream: #f4f1ea;
            --text-muted: #5a7ab8;
        }

        .thanks-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px;
            background-color: var(--bg-cream);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .thanks-icon {
            font-size: 4rem;
            color: var(--orange);
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .thanks-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .thanks-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 450px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .back-btn {
            background-color: var(--blue);
            color: var(--bg-cream);
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.3s, transform 0.3s;
        }

        .back-btn:hover {
            background-color: var(--orange);
            transform: translateY(-2px);
            color: var(--white);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-icon">✓</div>
        <h1 class="thanks-title">¡Mensaje enviado!</h1>
        <p class="thanks-message">
            Gracias por contactarme. Reviso cada mensaje personalmente
            y te responderé lo antes posible.
        </p>
        <a href="index.html" class="back-btn">Volver al sitio</a>
    </div>
</body>
</html>
