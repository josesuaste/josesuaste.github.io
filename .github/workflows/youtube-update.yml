name: Actualizar Videos de YouTube

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-videos:
    name: Actualizar videos en index.html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update YouTube Videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "YOUTUBE-VIDEOS-LIST"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCue5K1mHzM6JWRuG-xcyVtQ"
          max_post_count: 8
          template: |
            <a
                class="video-pill"
                href="$url"
                target="_blank"
                rel="noopener noreferrer"
                data-umami-event="Click-Video-YouTube"
            >
                <img
                    src="$thumbnail"
                    alt="$title"
                    loading="lazy"
                    decoding="async"
                >

                <span class="video-pill__overlay" aria-hidden="true"></span>

                <span class="video-pill__content">
                    <span class="video-pill__tag">Video</span>
                    <span class="video-pill__title">$title</span>
                </span>
            </a>
          commit_message: "🎬 Videos actualizados - ERROR 404"
          committer_username: "ERROR404Bot"
          committer_email: "actions@github.com"