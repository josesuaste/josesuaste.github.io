<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <style>
      .cls-1 { fill: #3d3d3d; }
      .cls-2 { fill: #fff; }

      /* Parpadeo */
      #ojo_izquierdo circle,
      #ojo_derecho circle {
        transform-box: fill-box;
        transform-origin: center;
        animation: parpadeo 5s ease-in-out infinite;
      }
      #ojo_derecho circle { animation-delay: 0.06s; }
      @keyframes parpadeo {
        0%, 80%, 100% { transform: scaleY(1); }
        87%            { transform: scaleY(0.04); }
        93%            { transform: scaleY(1); }
      }

      /* Rubor */
      .mejilla {
        animation: pulso-rubor 3s ease-in-out infinite;
      }
      @keyframes pulso-rubor {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 0.65; }
      }

      /* Boca */
      #boca {
        transform-box: fill-box;
        transform-origin: center;
        animation: boca-rebote 3s ease-in-out infinite;
        animation-delay: 0.45s;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes boca-rebote {
        0%, 100% { transform: scaleX(1) scaleY(1); }
        50%       { transform: scaleX(1.07) scaleY(1.12); }
      }
      svg:hover #boca {
        animation-play-state: paused;
        transform: scale(1.35);
      }
    </style>

    <filter id="blur-rubor" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <g id="fondo">
    <rect class="cls-2" width="300" height="300"/>
  </g>

  <ellipse class="mejilla" cx="62" cy="172" rx="32" ry="20" fill="#f9a8d4" filter="url(#blur-rubor)"/>
  <ellipse class="mejilla" cx="238" cy="172" rx="32" ry="20" fill="#f9a8d4" filter="url(#blur-rubor)"/>

  <g id="ojo_izquierdo" data-name="ojo izquierdo">
    <circle class="cls-1" cx="81.26" cy="129.39" r="10.99"/>
  </g>
  <g id="ojo_derecho" data-name="ojo derecho">
    <circle class="cls-1" cx="211.38" cy="129.39" r="10.99"/>
  </g>
  <g id="nariz">
    <circle class="cls-1" cx="150" cy="139.06" r="7.06"/>
  </g>
  <g id="boca">
    <path class="cls-1" d="M126.97,159.14c1.4.07,2.74.54,3.93,1.28,2.75,1.72,10.79,6.23,19.1,6.07,10.26-.2,14.33-3.63,18.01-5.84s8.19-1.91,9.66.05c0,0,2.4,2.02,1.28,5.79s-4.9,5.68-5.15,5.88-9.93,6.72-23.8,6.67-24.95-7.75-26.28-8.78-3.97-5.15-1.52-8.93c1.23-1.89,3.15-2.28,4.77-2.2Z"/>
  </g>
</svg>