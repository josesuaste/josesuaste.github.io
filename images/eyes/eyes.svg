<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="300" viewBox="0 0 600 300" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>ERROR 404 STUDIO - Vigilance Constant</title>
    
    <rect width="600" height="300" fill="#000000"/>

    <defs>
        <clipPath id="eye-shape">
            <path d="M50,150 Q150,65 250,150 Q150,235 50,150 Z" />
        </clipPath>
        <clipPath id="eye-shape-2">
            <path d="M350,150 Q450,65 550,150 Q450,235 350,150 Z" />
        </clipPath>
    </defs>

    <rect x="50" y="50" width="200" height="200" fill="#ffffff" clip-path="url(#eye-shape)" />
    <circle cx="150" cy="150" r="35" fill="#000000" clip-path="url(#eye-shape)" />

    <rect x="350" y="50" width="200" height="200" fill="#ffffff" clip-path="url(#eye-shape-2)" />
    <circle cx="450" cy="150" r="35" fill="#000000" clip-path="url(#eye-shape-2)" />
</svg>
